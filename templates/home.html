<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPV</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=favorite" />
</head>
<body>
    <header>
        <div class="container-home">
            <div class="nav">
                <div class="nav-left">
                    <div class="logo">
                        <a href="{{ url_for('home') }}">MPV</a>
                    </div>
                </div>
                <div class="nav-right">
                    <a href="{{ url_for('profile', user_id=session['user_id']) }}" class="profile-button">Perfil</a>
                    <form action="{{ url_for('logout') }}">
                        <button type="submit">Sair</button>
                    </form>
                </div>
            </div>
        </div>
    </header>
    <main>
        <div class="main-menu">
            <h2>For you</h2>
            <form action="/" method="post" id="tweet">
                <textarea name="content" placeholder="Escreva o que você está pensando..." maxlength="150" rows="4" cols="80"></textarea>
                <button type="submit" id="tweet">Postar</button>
            </form>
            {% for post in posts %}
                <div class="post">
                    <p><strong><a href="{{ url_for('profile', user_id=post[5]) }}">{{ post[3] }}</a></strong></p>
                    <p>{{ post[1] }}</p>
                    <p><small>{{ post[7] }}</small></p>
                    <div class="reaction">
                        <button id="like-button-{{ post[0] }}" onclick="toggleLike({{ post[0] }})">
                            <span id="like-icon-{{ post[0] }}" class="material-symbols-outlined {% if post[6] %}liked{% else %}unliked{% endif %}">
                                favorite
                            </span>
                            <span id="like-count-{{ post[0] }}">{{ post[4] }}</span>
                        </button>
                        <div class="comment_layout">
                            <form action="{{ url_for('comment_post', post_id=post[0]) }}" method="POST">
                                <input type="text" name="comment_content" placeholder="Escreva um comentário" required>
                                <button type="submit">Comentar</button>
                            </form>
                        </div>
                        <div class="comments">
                            {% for comment in post[9] %}
                                <p>
                                    <strong>{{ comment[0] }}:</strong> {{ comment[1] }}<br>
                                    <small>{{ comment[2] }}</small>
                                </p>
                            {% endfor %}
                        </div>
                        {% if post[5] == session['user_id'] %}  <!-- Verificação se o post é do usuário logado -->
                            <form action="{{ url_for('delet_post', post_id=post[0]) }}" method="POST" onsubmit="return confirm('Tem certeza que deseja excluir esta postagem?');">
                                <button type="submit">Apagar</button>
                            </form>
                        {% endif %}
                    </div>
                </div>
            {% endfor %}
        </div>
    </main>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
